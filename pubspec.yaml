name: flutter_bili
description: "Developing Bilibili with Flutter."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  u_widget:
    path: ../../FP/u_widget
  # 媒体通知.鸿蒙适配
  audio_service:
    git:
      url: https://gitcode.com/openharmony-sig/fluttertpc_audio_service.git
      path: audio_service
      ref: br_v0.18.18_ohos_dev
  audio_session:
    git:
      url: https://gitcode.com/openharmony-sig/flutter_audio_session.git
      ref: br_v0.2.2_ohos
  fvp: ^0.36.1
  media_kit:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: main
      path: ./media_kit
  media_kit_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: main
      path: ./media_kit_video
  media_kit_libs_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: main
      path: ./libs/universal/media_kit_libs_video
  provider: ^6.1.5+1
  dio: ^5.9.2
  cached_network_image: ^3.4.1
  saver_gallery: ^4.1.0
  pretty_qr_code: ^3.6.0
  extended_nested_scroll_view: ^6.2.1
  canvas_danmaku: ^0.3.1
  window_manager: ^0.5.1
  tray_manager: ^0.5.2
  os_type: ^0.2.2
  video_player: ^2.10.1
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  crypto: ^3.0.6
  go_router: ^17.2.2
  very_good_analysis: ^10.0.0

dependency_overrides:
  path_provider: # 应用可用路径.鸿蒙适配
    git:
      url: https://gitcode.com/openharmony-tpc/flutter_packages.git
      path: packages/path_provider/path_provider
      ref: br_path_provider-v2.1.5_ohos
  media_kit:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: main
      path: ./media_kit
  media_kit_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: main
      path: ./media_kit_video
  media_kit_libs_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: main
      path: ./libs/universal/media_kit_libs_video
  media_kit_libs_linux:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: main
      path: ./libs/linux/media_kit_libs_linux
  media_kit_libs_ios_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: main
      path: ./libs/ios/media_kit_libs_ios_video
  media_kit_libs_android_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: main
      path: ./libs/android/media_kit_libs_android_video
  media_kit_libs_windows_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: main
      path: ./libs/windows/media_kit_libs_windows_video
  media_kit_libs_macos_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: main
      path: ./libs/macos/media_kit_libs_macos_video

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_ce_generator: ^1.11.1
  build_runner: ^2.13.1

flutter:
  uses-material-design: true
